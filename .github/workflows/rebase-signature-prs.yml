name: Rebase signature PRs

on:
  push:
    branches: [main]
    paths:
      - signatures.json
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: rebase-signature-prs
  cancel-in-progress: false

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rebase open signature PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/rebase-signature-prs.mjs
