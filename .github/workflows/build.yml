name: Build site

on:
  push:
    branches: [main]
    paths:
      - signatures.json
      - build.py
      - index.html
      - sitemap.xml
      - requirements.txt
  workflow_dispatch:
  schedule:
    # Weekly heartbeat at 00:00 UTC every Monday — refreshes sitemap lastmod
    # so search engines see the page as actively maintained.
    - cron: "0 0 * * 1"

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python build.py

      - name: Commit any changes
        run: |
          git add index.html sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-rebuild [skip ci]"
          git push
